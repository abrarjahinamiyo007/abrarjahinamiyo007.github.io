<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Cup 26 — Live Hub (BST)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0a0a0b; --panel:#141418; --panel-2:#1b1b21; --line:#2a2a31;
    --gold:#E8C766; --gold-bright:#F7E199; --gold-deep:#B8901F;
    --text:#F5F2E9; --muted:#9a958a; --dim:#6b6760;
    --live:#ff4d4f; --green:#2fae66; --amber:#f4c531; --red:#e5544b;
    --gold-grad:linear-gradient(135deg,#F7E199 0%,#E8C766 38%,#B8901F 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:'Inter',system-ui,sans-serif;
    font-feature-settings:"tnum" 1;min-height:100vh;line-height:1.45;
    background-image:radial-gradient(1100px 520px at 50% -180px, rgba(232,199,102,.10), transparent 70%);}
  .wrap{max-width:1080px;margin:0 auto;padding:0 16px}

  header{position:sticky;top:0;z-index:50;background:rgba(10,10,11,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:center;gap:14px;height:60px}
  .mark{display:flex;align-items:baseline;gap:9px;text-decoration:none}
  .trophy{font-size:20px;filter:drop-shadow(0 0 6px rgba(232,199,102,.5))}
  .word{font-family:'Oswald';font-weight:700;font-size:20px;letter-spacing:.16em;text-transform:uppercase;line-height:1;
    background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .word .yr{color:var(--text);-webkit-text-fill-color:var(--text);opacity:.85}
  .ver{font-family:'Oswald';font-weight:600;font-size:10px;letter-spacing:.08em;color:#1a1408;background:var(--gold);padding:2px 6px;border-radius:5px;align-self:center;margin-left:auto}
  .hostbar{display:flex;gap:11px;padding:9px 0;justify-content:center;border-bottom:1px solid var(--line);flex-wrap:wrap;align-items:center}
  .host3{font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:.1em;text-transform:uppercase;-webkit-background-clip:text;background-clip:text;color:transparent}
  .host3.us{background:linear-gradient(100deg,#6a8bff 0%,#ffffff 50%,#ff6b6b 100%)}
  .host3.ca{background:linear-gradient(100deg,#ff5a5a 0%,#ffffff 50%,#ff5a5a 100%)}
  .host3.mx{background:linear-gradient(100deg,#34cf7a 0%,#ffffff 50%,#ff6b6b 100%)}
  .hsep{color:var(--dim);font-size:11px}
  .scorers{display:flex;justify-content:space-between;gap:10px;margin-top:10px;padding-top:9px;border-top:1px solid var(--line);font-size:12px;color:var(--gold-bright)}
  .scorers .ss{flex:1;line-height:1.5}
  .scorers .ss.away{text-align:right}
  .liveclock{display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Oswald';font-weight:600;font-size:12.5px;color:var(--live);letter-spacing:.1em;padding:4px 0}
  .lcdot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:pulse 1.6s infinite}
  .tlbtn{appearance:none;background:none;border:1px solid var(--line);color:var(--gold);font-family:'Oswald';font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:7px 10px;border-radius:8px;cursor:pointer;margin-top:10px;width:100%}
  .tlbtn:hover{border-color:var(--gold-deep)}
  .tlbox{margin-top:8px}
  .tlbox[hidden]{display:none}
  .timeline{padding:2px 0}
  .tlrow{display:grid;grid-template-columns:1fr 42px 1fr;align-items:center;column-gap:6px;padding:4px 0}
  .tlrow .min{grid-column:2;text-align:center;font-family:'Oswald';font-weight:600;font-size:11px;color:var(--gold);background:rgba(232,199,102,.08);border-radius:5px;padding:2px 0}
  .tlrow .ev{display:flex;align-items:center;gap:6px;font-size:13px}
  .tlrow.home .ev{grid-column:1;justify-content:flex-end;text-align:right}
  .tlrow.away .ev{grid-column:3;justify-content:flex-start}
  .tlrow .pl{color:var(--text)}
  .tlempty{font-size:12px;color:var(--dim);text-align:center;padding:10px}
  .ver{display:none}

  nav.tabs{display:flex;gap:2px;overflow-x:auto;border-bottom:1px solid var(--line);scrollbar-width:none}
  nav.tabs::-webkit-scrollbar{display:none}
  .tab{appearance:none;background:none;border:none;cursor:pointer;flex:0 0 auto;font-family:'Oswald';font-weight:500;font-size:13.5px;
    letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:14px 16px;position:relative;white-space:nowrap;transition:color .2s}
  .tab:hover{color:var(--text)}
  .tab.on{color:var(--gold-bright)}
  .tab.on::after{content:"";position:absolute;left:16px;right:16px;bottom:-1px;height:2px;background:var(--gold-grad)}

  #snapbar:empty{display:none}
  .snapbar-inner{background:rgba(232,199,102,.1);border-bottom:1px solid var(--gold-deep);color:var(--gold-bright);
    font-size:12px;line-height:1.4;padding:9px 16px;max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .snapbar-inner button{margin-left:auto;background:none;border:1px solid var(--gold-deep);color:var(--gold);font-family:'Oswald';
    font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;border-radius:7px;cursor:pointer;white-space:nowrap}

  main{padding:22px 0 80px}
  .view{animation:fade .35s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.view,*{animation:none!important}}
  .vhead{display:flex;align-items:center;gap:12px;margin:4px 2px 14px}
  .eyebrow{font-family:'Oswald';font-weight:300;letter-spacing:.22em;text-transform:uppercase;font-size:10.5px;color:var(--gold);opacity:.85}
  .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--gold-deep),transparent)}

  /* date rail */
  .fxtools{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .searchbox{flex:1;min-width:170px;display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:0 10px;height:42px}
  .searchbox:focus-within{border-color:var(--gold-deep)}
  .searchbox .si{opacity:.55;font-size:13px}
  .searchbox input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Inter';font-size:14px;min-width:0}
  .searchbox input::placeholder{color:var(--dim)}
  .searchbox .clr{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:4px}
  .seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;height:42px}
  .segb{appearance:none;background:none;border:none;cursor:pointer;color:var(--muted);font-family:'Oswald';font-weight:500;font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:0 13px;transition:.15s}
  .segb.on{background:var(--gold-grad);color:#1a1408}
  .reshead{font-size:14px;color:var(--muted);margin-bottom:4px;padding:0 2px}
  .reshead span{color:var(--gold-bright);font-weight:600}
  .daysep{font-family:'Oswald';font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin:20px 2px 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .daysep:first-child{margin-top:2px}
  .slidewrap{position:relative;display:flex;align-items:center;gap:6px}
  .slides{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:12px;scrollbar-width:none;flex:1;padding:2px;-webkit-overflow-scrolling:touch}
  .slides::-webkit-scrollbar{display:none}
  .slide{flex:0 0 100%;scroll-snap-align:center}
  .slide .match{margin-bottom:0}
  .snav{flex:0 0 36px;height:36px;border-radius:50%;background:var(--panel);border:1px solid var(--line);color:var(--gold);cursor:pointer;font-size:17px;display:grid;place-items:center}
  .snav:hover{border-color:var(--gold-deep)}
  .scount{text-align:center;font-family:'Oswald';font-size:12px;letter-spacing:.08em;color:var(--muted);margin-top:14px;text-transform:uppercase}
  @media(max-width:560px){.snav{display:none}}
  .ver{font-family:'Oswald';font-weight:600;font-size:10px;letter-spacing:.08em;color:#1a1408;background:var(--gold);padding:2px 6px;border-radius:5px;align-self:center;margin-left:auto}
  .daterail{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .dbtn{appearance:none;background:var(--panel);border:1px solid var(--line);color:var(--text);width:38px;height:42px;border-radius:9px;
    cursor:pointer;font-size:16px;display:grid;place-items:center;transition:.18s}
  .dbtn:hover{border-color:var(--gold-deep);color:var(--gold)}
  .dlabel{flex:1;text-align:center}
  .dlabel .d1{font-family:'Oswald';font-weight:600;font-size:17px;letter-spacing:.03em}
  .dlabel .d2{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  .today{appearance:none;background:none;border:1px solid var(--gold-deep);color:var(--gold);font-family:'Oswald';font-size:11px;
    letter-spacing:.14em;text-transform:uppercase;padding:11px 12px;border-radius:9px;cursor:pointer;transition:.18s}
  .today:hover{background:rgba(232,199,102,.08)}
  .tzline{text-align:center;font-size:10.5px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;margin-bottom:16px;font-family:'Oswald'}

  /* match card */
  .match{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px;transition:transform .15s,border-color .15s}
  .match:hover{transform:translateY(-1px);border-color:#3a3a42}
  .mtop{display:flex;align-items:center;gap:8px;margin-bottom:11px;min-height:16px}
  .mstage{font-family:'Oswald';font-weight:300;letter-spacing:.13em;text-transform:uppercase;font-size:10px;color:var(--dim)}
  .mstatus{margin-left:auto;font-size:11px;font-weight:600;color:var(--muted)}
  .mstatus.ft{color:var(--gold)}
  .mstatus .bst{color:var(--dim);font-weight:500;font-size:10px;margin-left:3px}
  .livebadge{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--live);letter-spacing:.1em;text-transform:uppercase}
  .livedot{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,77,79,.55)}70%{box-shadow:0 0 0 7px rgba(255,77,79,0)}100%{box-shadow:0 0 0 0 rgba(255,77,79,0)}}
  .team{display:flex;align-items:center;gap:11px;padding:5px 0}
  .team img{width:28px;height:28px;object-fit:contain;flex:0 0 28px}
  .crest{border-radius:50%;background:var(--panel-2);border:1px solid var(--line);display:grid;place-items:center;
    font-family:'Oswald';font-weight:600;color:var(--gold)}
  .tname{font-weight:600;font-size:15px}
  .tname.tbd{color:var(--dim);font-weight:500;font-style:italic}
  .score{margin-left:auto;font-family:'Oswald';font-weight:600;font-size:21px;min-width:26px;text-align:right;color:var(--muted)}
  .team.win .score,.team.win .tname{color:var(--gold-bright)}
  .team.win .score{font-weight:700}
  .mvenue{margin-top:9px;padding-top:9px;border-top:1px solid var(--line);font-size:11px;color:var(--dim)}
  .pill{margin-left:auto;font-family:'Oswald';font-weight:600;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .pill.up{color:var(--gold);border:1px solid rgba(232,199,102,.35);background:rgba(232,199,102,.06)}
  .pill.live{color:#fff;background:var(--live);box-shadow:0 0 12px rgba(255,77,79,.4)}
  .pill.live .livedot{background:#fff}
  .pill.done{color:#9fe0b8;border:1px solid rgba(47,174,102,.4);background:rgba(47,174,102,.08)}

  /* standings */
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin:0 2px 14px;font-size:11.5px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:7px}
  .ldot{width:10px;height:10px;border-radius:3px}
  .ldot.g{background:var(--green)}.ldot.y{background:var(--amber)}.ldot.r{background:var(--red)}
  .groups{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  @media(max-width:680px){.groups{grid-template-columns:1fr}}
  .gcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .gcard h3{font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:.16em;text-transform:uppercase;padding:12px 14px;border-bottom:1px solid var(--line);color:var(--gold)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{font-family:'Oswald';font-weight:400;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);text-align:right;padding:8px 6px}
  th.tm{text-align:left;padding-left:12px}
  td{padding:9px 6px;text-align:right;border-top:1px solid rgba(42,42,49,.6)}
  td.tm{text-align:left;padding-left:8px}
  td.tm .cell{display:flex;align-items:center;gap:9px}
  td.tm img{width:20px;height:20px;object-fit:contain;flex:0 0 20px}
  td.pts{font-family:'Oswald';font-weight:600;color:var(--text)}
  .pos{display:inline-grid;place-items:center;width:19px;height:19px;border-radius:5px;font-family:'Oswald';font-weight:700;font-size:11px;color:#0c0c0c;margin-right:2px}
  .pos.g{background:var(--green);color:#04140b}.pos.y{background:var(--amber);color:#1a1404}.pos.r{background:var(--red);color:#fff}
  tr.g td.tm{box-shadow:inset 3px 0 0 var(--green)} tr.g td{background:rgba(47,174,102,.05)}
  tr.y td.tm{box-shadow:inset 3px 0 0 var(--amber)} tr.y td{background:rgba(244,197,49,.05)}
  tr.r td.tm{box-shadow:inset 3px 0 0 var(--red)}

  /* third place qualification table */
  .qcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:8px}
  .qcard h3{font-family:'Oswald';font-weight:600;font-size:13px;letter-spacing:.14em;text-transform:uppercase;padding:13px 14px;color:var(--gold);border-bottom:1px solid var(--line)}
  .qtag{display:inline-grid;place-items:center;min-width:26px;height:18px;border-radius:5px;font-family:'Oswald';font-weight:600;font-size:10px;letter-spacing:.04em}
  .qtag.in{background:rgba(47,174,102,.16);color:#79e0a8;border:1px solid rgba(47,174,102,.4)}
  .qtag.out{background:rgba(229,84,75,.14);color:#f0928c;border:1px solid rgba(229,84,75,.4)}
  .grouptag{font-size:10px;color:var(--dim);font-family:'Oswald';letter-spacing:.06em}
  tr.qin td{background:rgba(47,174,102,.05)} tr.qin td.tm{box-shadow:inset 3px 0 0 var(--green)}
  tr.qcut{border-top:2px solid var(--gold-deep)!important}

  /* bracket */
  .brackscroll{overflow-x:auto;padding-bottom:14px;scrollbar-width:thin}
  .bracket{display:flex;gap:26px;min-width:max-content;padding:4px}
  .round{display:flex;flex-direction:column;justify-content:space-around;gap:14px;min-width:178px}
  .rtitle{font-family:'Oswald';font-weight:600;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);text-align:center;padding-bottom:4px;margin-bottom:2px;border-bottom:1px solid var(--gold-deep)}
  .tie{background:var(--panel);border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .tie.final-tie{border-color:var(--gold-deep);box-shadow:0 0 22px rgba(232,199,102,.12)}
  .slot{display:flex;align-items:center;gap:8px;padding:8px 10px;font-size:13px}
  .slot+.slot{border-top:1px solid var(--line)}
  .slot img{width:18px;height:18px;object-fit:contain;flex:0 0 18px}
  .slot .nm{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .slot .nm.tbd{color:var(--dim);font-style:italic;font-weight:500}
  .slot .sc{margin-left:auto;font-family:'Oswald';font-weight:600;color:var(--muted)}
  .slot.win .nm,.slot.win .sc{color:var(--gold-bright)}
  .champwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-width:150px}
  .champ-emblem{font-size:30px;filter:drop-shadow(0 0 10px rgba(232,199,102,.6))}
  .champ-label{font-family:'Oswald';font-weight:300;letter-spacing:.2em;text-transform:uppercase;font-size:10px;color:var(--gold)}

  /* stats */
  .bigstats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
  .bigstat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 12px;text-align:center}
  .bigstat .n{font-family:'Oswald';font-weight:700;font-size:30px;background:var(--gold-grad);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1}
  .bigstat .l{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  .statgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  @media(max-width:680px){.statgrid{grid-template-columns:1fr}}
  .scard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .scard h3{font-family:'Oswald';font-weight:600;font-size:12px;letter-spacing:.13em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
  .srow{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid rgba(42,42,49,.55);font-size:14px}
  .srow:first-of-type{border-top:none}
  .srow .rk{font-family:'Oswald';font-weight:600;font-size:12px;color:var(--dim);width:16px;flex:0 0 16px}
  .srow img{width:22px;height:22px;object-fit:contain;flex:0 0 22px}
  .srow .nm{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .srow .sub{font-size:11px;color:var(--dim);font-family:'Oswald';letter-spacing:.05em}
  .srow .val{margin-left:auto;font-family:'Oswald';font-weight:600;font-size:17px;color:var(--gold-bright)}

  .state{text-align:center;padding:50px 20px;color:var(--muted)}
  .state .ic{font-size:30px;margin-bottom:10px;opacity:.6}
  .state .msg{font-size:14px;line-height:1.5}
  .state button{margin-top:14px;background:none;border:1px solid var(--gold-deep);color:var(--gold);font-family:'Oswald';letter-spacing:.12em;text-transform:uppercase;font-size:12px;padding:9px 16px;border-radius:9px;cursor:pointer}
  .skel{background:linear-gradient(90deg,var(--panel) 25%,var(--panel-2) 37%,var(--panel) 63%);background-size:400% 100%;animation:sh 1.3s infinite;border-radius:12px;height:74px;margin-bottom:10px}
  @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}

  footer{border-top:1px solid var(--line);padding:18px 0;text-align:center;font-size:11px;color:var(--dim)}
  footer .live-ind{display:inline-flex;align-items:center;gap:6px;color:var(--green)}
  footer .live-ind .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
  footer .copyr{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font-family:'Oswald';font-weight:500;letter-spacing:.16em;text-transform:uppercase;font-size:11.5px;color:var(--gold);opacity:.9}
</style>
</head>
<body>
<header>
  <div class="wrap bar">
    <a class="mark" href="#"><span class="trophy">🏆</span><span class="word">World&nbsp;Cup&nbsp;<span class="yr">26</span></span></a>
  </div>
  <div class="wrap hostbar">
    <span class="host3 us">United States</span><span class="hsep">·</span><span class="host3 ca">Canada</span><span class="hsep">·</span><span class="host3 mx">Mexico</span>
  </div>
  <div class="wrap">
    <nav class="tabs" id="tabs">
      <button class="tab on" data-v="fixtures">Fixtures</button>
      <button class="tab" data-v="table">Table</button>
      <button class="tab" data-v="bracket">Bracket</button>
      <button class="tab" data-v="stats">Stats</button>
    </nav>
  </div>
</header>
<div id="snapbar"></div>
<main class="wrap" id="main"></main>
<footer class="wrap">
  <div>Live data via ESPN · <span class="live-ind"><span class="dot"></span>auto-updating</span> · times in Bangladesh Standard Time · <span id="updated"></span></div>
  <div class="copyr">© 2026 Abrar Jahin Amiyo · All rights reserved</div>

/* ---- BST date helpers ---- */
const _ymdFmt=new Intl.DateTimeFormat("en-CA",{timeZone:TZ,year:"numeric",month:"2-digit",day:"2-digit"});
function bstYMD(d){return _ymdFmt.format(d).replaceAll("-","");}
function bstTodayYMD(){return bstYMD(new Date());}
function shiftYMD(ymd,delta){
  const y=+ymd.slice(0,4),m=+ymd.slice(4,6),da=+ymd.slice(6,8);
  const d=new Date(Date.UTC(y,m-1,da)+delta*864e5);
  return `${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}`;
}
function ymdLabel(ymd){
  const y=+ymd.slice(0,4),m=+ymd.slice(4,6),da=+ymd.slice(6,8);
  const d=new Date(Date.UTC(y,m-1,da));
  return {wd:d.toLocaleDateString("en-US",{weekday:"long",timeZone:"UTC"}),
          full:d.toLocaleDateString("en-US",{month:"long",day:"numeric",timeZone:"UTC"}),yr:y};
}
const kickoff=iso=>new Date(iso).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZone:TZ});

let state={view:"fixtures", ymd:bstTodayYMD(), fxMode:"list", q:""};

/* ---- misc ---- */
function badge(code,size){return `<span class="crest" style="width:${size}px;height:${size}px;font-size:${Math.round(size*.36)}px">${(code||"").slice(0,3)}</span>`;}
function flagFail(img){const c=img.getAttribute("data-code")||"";img.outerHTML=`<span class="crest" style="width:${img.style.width};height:${img.style.height};font-size:11px">${c.slice(0,3)}</span>`;}
function flagFromCode(code,size,extra){
  const src=code&&FLAGS[code];
  if(src)return `<img src="${src}" alt="" data-code="${code}" loading="lazy" style="width:${size}px;height:${size}px;object-fit:contain;border-radius:3px${extra||""}" onerror="flagFail(this)">`;
  return badge(code,size);
}
function crest(t,size){
  const code=(t&&(t.code||t.abbreviation))||"";
  if(code&&FLAGS[code])return flagFromCode(code,size);
  const url=t&&(t.logo||(t.logos&&t.logos[0]&&t.logos[0].href));
  if(url)return `<img src="${url}" alt="" data-code="${code}" loading="lazy" style="width:${size}px;height:${size}px;object-fit:contain;border-radius:3px" onerror="flagFail(this)">`;
  return badge(code,size);
}
function flagImg(code,size){return flagFromCode(code,size);}
function codeFromFlag(href){const m=(href||"").match(/\/countries\/\d+\/(\w+)\.png/);return m?m[1].toUpperCase():"";}
function setUpdated(){document.getElementById("updated").textContent="updated "+new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZone:TZ})+" BST";}
function syncBanner(){
  const b=document.getElementById("snapbar");if(!b)return;
  if(SNAPSHOT_MODE){
    b.innerHTML=`<div class="snapbar-inner">📅 Saved snapshot — the in-app viewer can't reach ESPN. Open this file in Chrome or Safari (or host it online) for live, auto-updating data.<button id="retryl">Retry live</button></div>`;
    const r=document.getElementById("retryl");if(r)r.onclick=()=>{SNAPSHOT_MODE=false;views[state.view]();};
  }else b.innerHTML="";
}
function loading(n){main.innerHTML=Array.from({length:n}).map(()=>`<div class="skel"></div>`).join("");}
function errorState(msg,fn){main.innerHTML=`<div class="view"><div class="state"><div class="ic">⚠️</div><div class="msg">${msg}</div><button onclick="${fn}()">Try again</button></div></div>`;}
async function feed(url,key){
  try{const r=await fetch(url);if(!r.ok)throw 0;return await r.json();}
  catch(e){SNAPSHOT_MODE=true;return JSON.parse(JSON.stringify(SNAP[key]));}
}

/* ===== FIXTURES ===== */
let fullCache=null;
async function getFullSchedule(force){
  if(fullCache&&!force)return fullCache;
  try{const r=await fetch(`${BASE}/scoreboard?dates=20260611-20260719&limit=400`);if(!r.ok)throw 0;fullCache=(await r.json()).events||[];}
  catch(e){SNAPSHOT_MODE=true;fullCache=SNAP.allFixtures;}
  return fullCache;
}
function teamText(e){return e.competitions[0].competitors.map(c=>(c.team&&c.team.displayName)||"").join(" ").toLowerCase();}
function evIcon(t){return t==="goal"||t==="pen"?"⚽":t==="own"?"🥅":t==="yellow"?"🟨":t==="red"?"🟥":"•";}
function scorersLine(ev,side){
  const g=(ev||[]).filter(x=>x.side===side&&(x.type==="goal"||x.type==="pen"||x.type==="own"));
  if(!g.length)return "";
  return g.map(x=>`${x.p}${x.type==="pen"?" (P)":x.type==="own"?" (OG)":""} ${x.m}`).join(", ");
}
function timelineHTML(ev){
  if(!ev||!ev.length)return `<div class="tlempty">No goals or cards recorded for this match.</div>`;
  return `<div class="timeline">`+ev.map(x=>`<div class="tlrow ${x.side}"><span class="ev"><span class="ico">${evIcon(x.type)}</span><span class="pl">${x.p}</span></span><span class="min">${x.m||""}</span></div>`).join("")+`</div>`;
}
async function loadMatchEvents(id){
  if(SNAP.events&&SNAP.events[id])return SNAP.events[id];
  try{
    const d=await (await fetch(`${BASE}/summary?event=${id}`)).json();
    const side={};let comps=[];try{comps=d.header.competitions[0].competitors;}catch(_){}
    comps.forEach(c=>side[String(c.id)]=c.homeAway);
    const KEEP={"Goal":"goal","Own Goal":"own","Yellow Card":"yellow","Red Card":"red"};
    const out=[];
    (d.keyEvents||[]).forEach(x=>{
      const txt=(x.type||{}).text||"",ftxt=(x.text||"")+" "+(x.shortText||"");
      let cl=txt==="Goal"?(/[Pp]enalty/.test(ftxt)?"pen":/[Oo]wn [Gg]oal/.test(ftxt)?"own":"goal"):KEEP[txt];
      if(!cl)return;
      const sd=side[String((x.team||{}).id)];if(!sd)return;
      const parts=x.participants||[];
      const p=parts[0]&&parts[0].athlete?parts[0].athlete.displayName:((x.shortText||"").replace(" Goal","").trim()||"—");
      out.push({m:(x.clock||{}).displayValue||"",type:cl,side:sd,p});
    });
    return out;
  }catch(e){return (SNAP.events&&SNAP.events[id])||[];}
}
function cardHTML(e,showDate){
  const c=e.competitions[0],st=e.status.type,slug=(e.season&&e.season.slug)||"";
  const live=st.state==="in",done=st.state==="post";
  const liveMin=live?((e.status&&e.status.displayClock)||st.detail||"LIVE"):"";
  const home=c.competitors.find(x=>x.homeAway==="home")||c.competitors[0];
  const away=c.competitors.find(x=>x.homeAway==="away")||c.competitors[1];
  const pill=live?`<span class="pill live"><span class="livedot"></span>LIVE${liveMin?` · ${liveMin}`:""}</span>`
    :done?`<span class="pill done">FINISHED</span>`:`<span class="pill up">UPCOMING</span>`;
  const row=t=>{
    const win=(live||done)&&t.winner, show=live||done;
    const nm=(t.team&&t.team.displayName)||"TBD", tbd=!(t.team&&t.team.displayName);
    return `<div class="team ${win?'win':''}">${crest(t.team,28)}<span class="tname ${tbd?'tbd':''}">${nm}</span><span class="score">${show?(t.score??"0"):"–"}</span></div>`;
  };
  const stage=slug?slug.replace(/-/g," ").replace(/\b\w/g,m=>m.toUpperCase()):"Group Stage";
  const vtxt=c.venue?`${c.venue.fullName}${c.venue.address&&c.venue.address.city?", "+c.venue.address.city:""}`:"";
  let dpfx="";
  if(showDate){const l=ymdLabel(bstYMD(new Date(e.date)));dpfx=`${l.wd.slice(0,3)} ${l.full} · `;}
  const base=live?(vtxt?`📍 ${vtxt}`:"In progress")
    :done?`Full time${vtxt?` · 📍 ${vtxt}`:""}`
    :`⏱ ${kickoff(e.date)} BST${vtxt?` · 📍 ${vtxt}`:""}`;
  const meta=dpfx+base;
  const liveClock=live?`<div class="liveclock"><span class="lcdot"></span>${liveMin}</div>`:"";
  let extra="";
  if(live||done){
    const ev=(SNAP.events&&e.id&&SNAP.events[e.id])||null;
    const hs=scorersLine(ev,"home"),as=scorersLine(ev,"away");
    const scor=(hs||as)?`<div class="scorers"><div class="ss">${hs?`⚽ ${hs}`:""}</div><div class="ss away">${as?`${as} ⚽`:""}</div></div>`:"";
    extra=`${scor}<button class="tlbtn" data-id="${e.id||""}">▾ Goals &amp; timeline</button><div class="tlbox" id="tl-${e.id||""}" hidden>${ev?timelineHTML(ev):""}</div>`;
  }
  return `<div class="match"><div class="mtop"><span class="mstage">${stage}</span>${pill}</div>${row(home)}${liveClock}${row(away)}<div class="mvenue">${meta}</div>${extra}</div>`;
}
async function renderFixtures(){
  clearInterval(refreshTimer);
  main.innerHTML=`<div class="view">
    <div class="fxtools">
      <div class="searchbox"><span class="si">🔍</span><input id="fxsearch" placeholder="Search team or country…" value="${state.q.replace(/"/g,'&quot;')}" autocomplete="off"/><button id="fxclear" class="clr" style="${state.q?'':'visibility:hidden'}">✕</button></div>
      <div class="seg"><button class="segb ${state.fxMode==='list'?'on':''}" data-m="list">☰ List</button><button class="segb ${state.fxMode==='slide'?'on':''}" data-m="slide">▭ Slides</button></div>
    </div>
    <div id="fxhead"></div>
    <div class="tzline">Kick-off times · Bangladesh Standard Time (UTC+6)</div>
    <div id="flist">${'<div class="skel"></div>'.repeat(3)}</div></div>`;
  const si=document.getElementById("fxsearch");
  si.addEventListener("input",ev=>{state.q=ev.target.value;document.getElementById("fxclear").style.visibility=state.q?"visible":"hidden";clearTimeout(si._t);si._t=setTimeout(fillFixtures,250);});
  document.getElementById("fxclear").onclick=()=>{state.q="";renderFixtures();};
  document.querySelectorAll(".segb").forEach(b=>b.onclick=()=>{state.fxMode=b.dataset.m;renderFixtures();});
  fillFixtures();
}
async function fillFixtures(){
  clearInterval(refreshTimer);
  const head=document.getElementById("fxhead"),list=document.getElementById("flist");
  if(!head||!list)return;
  const q=state.q.trim().toLowerCase();
  const events=await getFullSchedule();
  setUpdated();syncBanner();
  let set;
  if(q){
    set=events.filter(e=>teamText(e).includes(q)||((e.season&&e.season.slug)||"").replace(/-/g," ").includes(q)).sort((a,b)=>new Date(a.date)-new Date(b.date));
    head.innerHTML=`<div class="reshead">${set.length} match${set.length!==1?"es":""} for “<span>${state.q.trim()}</span>”</div>`;
  }else{
    set=events.filter(e=>bstYMD(new Date(e.date))===state.ymd).sort((a,b)=>new Date(a.date)-new Date(b.date));
    const lab=ymdLabel(state.ymd);
    head.innerHTML=`<div class="daterail"><button class="dbtn" id="prev">‹</button><div class="dlabel"><div class="d1">${lab.wd}, ${lab.full}</div><div class="d2">${lab.yr}</div></div><button class="dbtn" id="next">›</button><button class="today" id="todayb">Today</button></div>`;
    document.getElementById("prev").onclick=()=>{state.ymd=shiftYMD(state.ymd,-1);fillFixtures();};
    document.getElementById("next").onclick=()=>{state.ymd=shiftYMD(state.ymd,1);fillFixtures();};
    document.getElementById("todayb").onclick=()=>{state.ymd=bstTodayYMD();fillFixtures();};
  }
  if(!set.length){list.innerHTML=`<div class="state"><div class="ic">${q?"🔍":"⚽"}</div><div class="msg">${q?`No matches found for “${state.q.trim()}”.`:"No matches on this date.<br><span style='font-size:12px;color:var(--dim)'>Use the arrows to browse Jun 11 – Jul 19.</span>"}</div></div>`;return;}
  if(state.fxMode==="slide"){
    list.innerHTML=`<div class="slidewrap"><button class="snav" id="sprev">‹</button><div class="slides" id="slides">${set.map(e=>`<div class="slide">${cardHTML(e,true)}</div>`).join("")}</div><button class="snav" id="snext">›</button></div><div class="scount" id="scount"></div>`;
    const sl=document.getElementById("slides");
    const upd=()=>{const i=Math.round(sl.scrollLeft/sl.clientWidth);document.getElementById("scount").textContent=`${Math.min(i+1,set.length)} / ${set.length}  ·  swipe to browse`;};
    sl.addEventListener("scroll",()=>{clearTimeout(sl._s);sl._s=setTimeout(upd,60);});
    document.getElementById("sprev").onclick=()=>sl.scrollBy({left:-sl.clientWidth,behavior:"smooth"});
    document.getElementById("snext").onclick=()=>sl.scrollBy({left:sl.clientWidth,behavior:"smooth"});
    upd();
  }else if(q){
    let html="",cur="";
    set.forEach(e=>{const y=bstYMD(new Date(e.date));if(y!==cur){cur=y;const l=ymdLabel(y);html+=`<div class="daysep">${l.wd}, ${l.full}</div>`;}html+=cardHTML(e,false);});
    list.innerHTML=html;
  }else{
    list.innerHTML=set.map(e=>cardHTML(e,false)).join("");
  }
  const anyLive=set.some(e=>e.status.type.state==="in");
  if(anyLive&&!SNAPSHOT_MODE&&state.fxMode==="list"&&!q)refreshTimer=setInterval(()=>{if(state.view==="fixtures"){fullCache=null;fillFixtures();}},30000);
}

/* ===== TABLE ===== */
function sv(e,n){const s=(e.stats||[]).find(x=>x.name===n);return s?s.displayValue:"–";}
function sortGroup(entries){
  return entries.slice().sort((a,b)=>
    (+sv(b,"points")||0)-(+sv(a,"points")||0)||
    (parseInt(sv(b,"pointDifferential"))||0)-(parseInt(sv(a,"pointDifferential"))||0)||
    (+sv(b,"pointsFor")||0)-(+sv(a,"pointsFor")||0));
}
async function renderTable(){
  clearInterval(refreshTimer);loading(6);
  try{
    const data=await feed(STAND,"standings");setUpdated();syncBanner();
    const groups=data.children||[];
    const thirds=[];
    const html=groups.map(g=>{
      const entries=sortGroup((g.standings&&g.standings.entries)||[]);
      if(entries[2])thirds.push({group:g.name.replace("Group ","").trim(),e:entries[2]});
      const rows=entries.map((e,i)=>{
        const cls=i<2?"g":i===2?"y":"r", t=e.team;
        return `<tr class="${cls}"><td class="tm"><div class="cell"><span class="pos ${cls}">${i+1}</span>${crest(t,20)}<span>${t.shortDisplayName||t.displayName}</span></div></td>
          <td>${sv(e,"gamesPlayed")}</td><td>${sv(e,"wins")}</td><td>${sv(e,"ties")}</td><td>${sv(e,"losses")}</td><td>${sv(e,"pointDifferential")}</td><td class="pts">${sv(e,"points")}</td></tr>`;
      }).join("");
      return `<div class="gcard"><h3>${g.name}</h3><table><thead><tr><th class="tm">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }).join("");

    // best third-placed teams
    thirds.sort((A,B)=>{const a=A.e,b=B.e;
      return (+sv(b,"points")||0)-(+sv(a,"points")||0)||
        (parseInt(sv(b,"pointDifferential"))||0)-(parseInt(sv(a,"pointDifferential"))||0)||
        (+sv(b,"pointsFor")||0)-(+sv(a,"pointsFor")||0);});
    const qrows=thirds.map((x,i)=>{
      const e=x.e,t=e.team,inq=i<8;
      return `<tr class="${inq?'qin':''} ${i===8?'qcut':''}">
        <td class="tm"><div class="cell"><span class="pos ${inq?'g':'r'}">${i+1}</span>${crest(t,20)}<span>${t.shortDisplayName||t.displayName}</span> <span class="grouptag">GRP ${x.group}</span></div></td>
        <td>${sv(e,"wins")}</td><td>${sv(e,"ties")}</td><td>${sv(e,"losses")}</td><td>${sv(e,"pointDifferential")}</td><td class="pts">${sv(e,"points")}</td>
        <td><span class="qtag ${inq?'in':'out'}">${inq?'IN':'OUT'}</span></td></tr>`;
    }).join("");
    const qtable=thirds.length?`<div class="qcard"><h3>Best Third-Placed Teams · Qualification Scenario</h3>
      <table><thead><tr><th class="tm">Team</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th><th>Status</th></tr></thead><tbody>${qrows}</tbody></table></div>
      <p style="margin:10px 2px 0;font-size:11px;color:var(--dim)">The 8 best third-placed teams advance to the Round of 32. Ranked by points, then goal difference, then goals scored (provisional — final FIFA tiebreakers also include disciplinary record).</p>`:"";

    main.innerHTML=`<div class="view">
      <div class="vhead"><div class="eyebrow">Group Stage</div><span class="rule"></span></div>
      <div class="legend"><span><span class="ldot g"></span>Top 2 — through to Round of 32</span><span><span class="ldot y"></span>3rd — best-third contention</span><span><span class="ldot r"></span>4th — eliminated</span></div>
      <div class="groups">${html}</div>
      <div class="vhead" style="margin-top:24px"><div class="eyebrow">Who Else Goes Through</div><span class="rule"></span></div>
      ${qtable}</div>`;
  }catch(err){errorState("Couldn't load the standings.","renderTable");}
}

/* ===== BRACKET ===== */
const RND=[
  {label:"Round of 32",m:s=>s.includes("32")},
  {label:"Round of 16",m:s=>s.includes("16")},
  {label:"Quarter-finals",m:s=>s.includes("quarter")},
  {label:"Semi-finals",m:s=>s.includes("semi")},
  {label:"Final",m:s=>s.includes("final")&&!s.includes("semi")&&!s.includes("quarter")&&!s.includes("third")}
];
function bslot(t,decided){
  const nm=(t&&t.team&&t.team.displayName)||"TBD",tbd=!(t&&t.team&&t.team.displayName);
  const win=decided&&t&&t.winner,sc=decided&&t&&t.score!=null?t.score:"";
  return `<div class="slot ${win?'win':''}">${t&&t.team?crest(t.team,18):'<span class="crest" style="width:18px;height:18px"></span>'}<span class="nm ${tbd?'tbd':''}">${nm}</span><span class="sc">${sc}</span></div>`;
}
async function renderBracket(){
  clearInterval(refreshTimer);loading(3);
  try{
    const data=await feed(`${BASE}/scoreboard?dates=20260627-20260720&limit=200`,"bracket");
    setUpdated();syncBanner();
    const ko=(data.events||[]).filter(e=>{const s=((e.season&&e.season.slug)||"").toLowerCase();return RND.some(r=>r.m(s));});
    if(!ko.length){main.innerHTML=`<div class="view"><div class="state"><div class="ic">🗺️</div><div class="msg">The knockout bracket fills in once the group stage finishes.</div></div></div>`;return;}
    const cols=RND.map((r,idx)=>{
      const ms=ko.filter(e=>r.m(((e.season&&e.season.slug)||"").toLowerCase())).sort((a,b)=>new Date(a.date)-new Date(b.date));
      if(!ms.length)return "";
      const ties=ms.map(e=>{const c=e.competitions[0],dec=e.status.type.state==="post";
        const h=c.competitors.find(x=>x.homeAway==="home")||c.competitors[0];
        const a=c.competitors.find(x=>x.homeAway==="away")||c.competitors[1];
        return `<div class="tie ${idx===4?'final-tie':''}">${bslot(h,dec)}${bslot(a,dec)}</div>`;}).join("");
      return `<div class="round"><div class="rtitle">${r.label}</div>${ties}</div>`;
    }).join("");
    main.innerHTML=`<div class="view"><div class="vhead"><div class="eyebrow">Road to the Final</div><span class="rule"></span></div>
      <div class="brackscroll"><div class="bracket">${cols}<div class="round"><div class="rtitle">Champion</div><div class="champwrap"><div class="champ-emblem">🏆</div><div class="champ-label">To be crowned</div></div></div></div></div>
      <p style="margin:14px 2px 0;font-size:11px;color:var(--dim)">Scroll sideways to follow the bracket. Slots fill live as results come in.</p></div>`;
  }catch(err){errorState("Couldn't load the bracket.","renderBracket");}
}

/* ===== STATS ===== */
async function loadPlayers(){
  try{
    const ld=await (await fetch(LEADERS)).json();
    const cats={};(ld.categories||[]).forEach(c=>cats[c.name]=c);
    async function build(cat,n){
      const items=((cats[cat]||{}).leaders||[]).slice(0,n);
      return Promise.all(items.map(async it=>{
        const a=await (await fetch(it.athlete.$ref.replace("http://","https://"))).json();
        const fl=(a.flag||{}).href;
        return {name:a.displayName,flag:fl,code:codeFromFlag(fl),value:it.value};
      }));
    }
    return {scorers:await build("goalsLeaders",12),assists:await build("assistsLeaders",10)};
  }catch(e){SNAPSHOT_MODE=true;return SNAP.players;}
}
function playerList(arr,suffix){
  if(!arr||!arr.length)return `<div class="srow"><span class="nm" style="color:var(--dim)">Not available yet</span></div>`;
  return arr.map((p,i)=>`<div class="srow"><span class="rk">${i+1}</span>${flagImg(p.code,22)}<span class="nm">${p.name||"—"}</span><span class="sub">${p.code||""}</span><span class="val">${Math.round(p.value)}${suffix}</span></div>`).join("");
}
async function renderStats(){
  clearInterval(refreshTimer);loading(4);
  try{
    const data=await feed(STAND,"standings");setUpdated();
    const all=[];
    (data.children||[]).forEach(g=>((g.standings&&g.standings.entries)||[]).forEach(e=>all.push({
      team:e.team,gf:+sv(e,"pointsFor")||0,ga:+sv(e,"pointsAgainst")||0,gp:+sv(e,"gamesPlayed")||0})));
    const totalGoals=all.reduce((s,t)=>s+t.gf,0);
    const mp=Math.round(all.reduce((s,t)=>s+t.gp,0)/2);
    const avg=mp?(totalGoals/mp).toFixed(2):"0.00";
    const topT=[...all].sort((a,b)=>b.gf-a.gf).slice(0,5);
    const def=[...all].filter(t=>t.gp>0).sort((a,b)=>a.ga-b.ga).slice(0,5);
    const teamList=(arr,key,suf)=>arr.map((t,i)=>`<div class="srow"><span class="rk">${i+1}</span>${crest(t.team,22)}<span class="nm">${t.team.shortDisplayName||t.team.displayName}</span><span class="val">${t[key]}${suf}</span></div>`).join("");

    main.innerHTML=`<div class="view">
      <div class="vhead"><div class="eyebrow">Tournament Stats</div><span class="rule"></span></div>
      <div class="bigstats">
        <div class="bigstat"><div class="n">${totalGoals}</div><div class="l">Goals scored</div></div>
        <div class="bigstat"><div class="n">${mp}</div><div class="l">Matches played</div></div>
        <div class="bigstat"><div class="n">${avg}</div><div class="l">Goals / match</div></div></div>
      <div class="statgrid">
        <div class="scard"><h3>👟 Top Scorers</h3><div id="scorers">${'<div class="skel" style="height:36px"></div>'.repeat(3)}</div></div>
        <div class="scard"><h3>🅰️ Top Assists</h3><div id="assists">${'<div class="skel" style="height:36px"></div>'.repeat(3)}</div></div>
        <div class="scard"><h3>⚽ Top-Scoring Teams</h3>${teamList(topT,"gf"," gls")}</div>
        <div class="scard"><h3>🛡️ Meanest Defences</h3>${teamList(def,"ga"," conc")}</div>
      </div></div>`;

    const pl=await loadPlayers();syncBanner();
    const sEl=document.getElementById("scorers"),aEl=document.getElementById("assists");
    if(sEl)sEl.innerHTML=playerList(pl.scorers," gls");
    if(aEl)aEl.innerHTML=playerList(pl.assists," ast");
  }catch(err){errorState("Couldn't load stats.","renderStats");}
}

/* ===== router ===== */
const views={fixtures:renderFixtures,table:renderTable,bracket:renderBracket,stats:renderStats};
tabs.addEventListener("click",e=>{
  const b=e.target.closest(".tab");if(!b)return;
  [...tabs.children].forEach(t=>t.classList.toggle("on",t===b));
  state.view=b.dataset.v;views[state.view]();
});
main.addEventListener("click",async ev=>{
  const b=ev.target.closest(".tlbtn");if(!b)return;
  const id=b.dataset.id,box=document.getElementById("tl-"+id);if(!box)return;
  if(box.hasAttribute("hidden")){
    if(!box.innerHTML.trim()){box.innerHTML=`<div class="tlempty">Loading…</div>`;const evs=await loadMatchEvents(id);box.innerHTML=timelineHTML(evs);}
    box.removeAttribute("hidden");b.innerHTML="▴ Hide timeline";
  }else{box.setAttribute("hidden","");b.innerHTML="▾ Goals &amp; timeline";}
});
renderFixtures();
</script>
